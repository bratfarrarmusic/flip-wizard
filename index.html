<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Wizard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>Flip Wizard</h1>

      <section id="intro" class="panel intro-panel">
        <div id="homeHero" class="home-hero" role="img" aria-label="Flip Wizard game preview">
          <img id="homeHeroImage" class="home-hero-image" alt="Flip Wizard landing hero" src="" />
          <div id="homeHeroFallback" class="home-hero-fallback" aria-hidden="true">
            <p>Dig crates. Trust your gut. Build your score.</p>
          </div>
        </div>

        <h2>Can You Clear $20 Per Flip?</h2>

        <label class="input-label" for="playerName">Enter your name</label>
        <input id="playerName" class="name-input" type="text" maxlength="20" placeholder="Anonymous" autocomplete="nickname" />
        <button id="startBtn" class="primary-btn">Start Game</button>

        <div class="leaderboard-panel compact">
          <div class="leaderboard-head">
            <h3>Top Flippers</h3>
          </div>
          <ol id="introLeaderboard" class="leaderboard-list"></ol>
        </div>
      </section>

      <section id="roundAnnouncement" class="panel round-announcement hidden" aria-live="polite">
        <p id="announcementEyebrow" class="eyebrow"></p>
        <h2 id="announcementTitle"></h2>
        <p id="announcementBody" class="announcement-body"></p>
        <button id="startRoundBtn" class="primary-btn">Let's Go</button>
      </section>

      <section id="game" class="panel hidden" aria-live="polite">
        <div id="topBannerAdSlot" class="ad-slot banner-slot top-banner-slot" role="complementary" aria-label="Sponsored ad space">
          <div class="ad-copy-wrap">
            <span class="ad-chip">Sponsored</span>
            <span class="ad-caption">Ad space</span>
          </div>
        </div>

        <div class="round-row">
          <p id="roundLabel" class="round-pill"></p>
        </div>

        <div class="status-row expanded">
          <p id="cardCount" class="pill"></p>
          <p id="totalProgress" class="pill"></p>
          <p id="timer" class="pill timer-pill"></p>
          <p id="streak" class="pill"></p>
          <p id="speedScore" class="pill"></p>
          <p id="profitScore" class="pill"></p>
          <p id="score" class="pill headline-pill"></p>
        </div>

        <article id="recordCard" class="record-card">
          <div id="albumTile" class="album-tile" role="img" aria-label="Album cover">
            <img id="coverImage" class="cover-image" alt="Record cover" />
            <div id="coverFallback" class="cover-fallback" aria-hidden="true">
              <span id="tileArtist" class="tile-artist"></span>
              <span id="tileTitle" class="tile-title"></span>
            </div>
          </div>

          <div class="record-meta">
            <p class="meta-item"><span>Artist</span><strong id="artist"></strong></p>
            <p class="meta-item"><span>Title</span><strong id="title"></strong></p>
            <p class="meta-item"><span>Condition</span><strong id="gradeLine"></strong></p>
            <p class="meta-item"><span>Buy Price</span><strong id="buyPrice"></strong></p>
          </div>

          <div class="action-row">
            <button id="yesBtn" class="answer-btn yes">Yes</button>
            <button id="noBtn" class="answer-btn no">No</button>
          </div>
        </article>

        <div id="scoreFeedback" class="score-feedback hidden" aria-live="polite"></div>

        <div id="bottomBannerAdSlot" class="ad-slot banner-slot" role="complementary" aria-label="Sponsored ad space">
          <div class="ad-copy-wrap">
            <span class="ad-chip">Sponsored</span>
            <span class="ad-caption">Ad space</span>
          </div>
        </div>
      </section>

      <section id="result" class="panel hidden" aria-live="polite">
        <h2>Run Complete</h2>
        <p id="finalPlayer" class="summary"></p>
        <p id="finalSpeed" class="final-breakdown"></p>
        <p id="finalProfit" class="final-breakdown"></p>
        <p id="finalScore" class="final-score"></p>
        <p id="rating" class="rating"></p>
        <p id="summary" class="summary"></p>

        <div class="leaderboard-panel">
          <div class="leaderboard-head">
            <h3>Leaderboard</h3>
            <button id="clearLeaderboardBtn" class="text-btn" type="button">Clear</button>
          </div>
          <ol id="resultLeaderboard" class="leaderboard-list"></ol>
        </div>

        <button id="playAgainBtn" class="primary-btn">Play Again</button>
      </section>
    </main>

    <section id="betweenRoundInterstitial" class="interstitial hidden" aria-live="polite" role="dialog" aria-label="Sponsored transition space">
      <div class="interstitial-card">
        <p id="interstitialEyebrow" class="eyebrow"></p>
        <h2>Sponsored Break</h2>
        <p id="roundSummaryLine" class="announcement-body"></p>
        <div id="interstitialAdSlot" class="ad-slot interstitial-slot">
          <div class="ad-copy-wrap">
            <span class="ad-chip">Sponsored</span>
            <span class="ad-caption">Ad space</span>
          </div>
        </div>
        <button id="continueRoundBtn" class="primary-btn">Continue</button>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
