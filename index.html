<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Wizard</title>
    <link rel="preload" href="images/hero.png" as="image" />
    <link rel="preload" href="images/round-op-shop.png" as="image" />
    <link rel="preload" href="images/round-sunday-market.png" as="image" />
    <link rel="preload" href="images/round-yard-sale.png" as="image" />
    <link rel="preload" href="images/round-antique-shop.png" as="image" />
    <link rel="preload" href="images/round-record-fair.png" as="image" />
    <link rel="stylesheet" href="style.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3839676134418957" crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="app-shell">
      <h1 id="appTitle">Flip Wizard</h1>

      <section id="intro" class="panel intro-panel">
        <div id="homeHero" class="home-hero" role="img" aria-label="Flip Wizard game preview">
          <img id="homeHeroImage" class="home-hero-image" alt="" src="images/hero.png" aria-hidden="true" />
          <div class="home-hero-overlay" aria-hidden="true"></div>
          <div class="home-hero-copy">
            <div class="hero-explainer">
              <p>Original presses only.</p>
              <p>Goldmine Record/Sleeve grading rules every call.</p>
              <p>Say yes only when you can double your money.</p>
            </div>
          </div>
          <div id="homeHeroFallback" class="home-hero-fallback hidden" aria-hidden="true"></div>
        </div>

        <h2>Can You Double Your Money?</h2>

        <label class="input-label" for="playerName">Enter your name</label>
        <input id="playerName" class="name-input" type="text" maxlength="20" placeholder="Anonymous" autocomplete="nickname" />

        <label class="input-label" for="marketSelect">Which market do you wheel and deal in?</label>
        <select id="marketSelect" class="name-input market-input">
          <option value="au">eBay Australia</option>
          <option value="us">eBay US</option>
          <option value="uk">eBay UK</option>
          <option value="eu">Germany / EU</option>
        </select>

        <button id="startBtn" class="primary-btn">Start Game</button>

        <div class="leaderboard-panel compact">
          <div class="leaderboard-head">
            <h3>Top Flippers</h3>
          </div>
          <ol id="introLeaderboard" class="leaderboard-list"></ol>
        </div>
      </section>

      <section id="roundAnnouncement" class="panel round-announcement hidden" aria-live="polite">
        <div class="round-announcement-content">
          <p id="announcementEyebrow" class="eyebrow"></p>
          <h2 id="announcementTitle"></h2>
          <p id="announcementBody" class="announcement-body"></p>
          <button id="startRoundBtn" class="primary-btn">Start Round</button>
        </div>

        <div id="roundIntroAdSlot" class="ad-slot banner-slot round-intro-ad-slot" role="complementary" aria-label="Sponsored ad space"></div>
      </section>

      <section id="game" class="panel hidden" aria-live="polite">
        <div id="topBannerAdSlot" class="ad-slot banner-slot top-banner-slot" role="complementary" aria-label="Sponsored ad space"></div>

        <article id="recordCard" class="record-card">
          <div id="albumTile" class="album-tile" role="img" aria-label="Album cover">
            <img id="coverImage" class="cover-image" alt="Record cover" />
            <div id="coverFallback" class="cover-fallback" aria-hidden="true">
              <span id="tileArtist" class="tile-artist"></span>
              <span id="tileTitle" class="tile-title"></span>
            </div>
            <div class="card-overlay">
              <p id="artist" class="overlay-artist"></p>
              <p id="title" class="overlay-title"></p>
              <p id="gradeLine" class="overlay-detail"></p>
              <p id="buyPrice" class="overlay-detail"></p>
            </div>
            <p id="timerBadge" class="timer-tag">9.0s</p>
            <p id="roundLabel" class="corner-tag left"></p>
            <p id="cardCount" class="corner-tag right"></p>
          </div>

          <div class="action-row">
            <button id="yesBtn" class="answer-btn yes">Yes</button>
            <button id="noBtn" class="answer-btn no">No</button>
          </div>
        </article>

        <div id="bottomBannerAdSlot" class="ad-slot banner-slot" role="complementary" aria-label="Sponsored ad space"></div>
      </section>

      <section id="result" class="panel hidden" aria-live="polite">
        <h2>Run Complete</h2>
        <p id="finalPlayer" class="summary"></p>
        <p id="finalMarket" class="summary"></p>
        <p id="finalScore" class="final-score"></p>
        <p id="finalProfit" class="final-breakdown"></p>
        <p id="rating" class="rating"></p>
        <p id="summary" class="summary"></p>

        <div class="leaderboard-panel">
          <div class="leaderboard-head">
            <h3>Leaderboard</h3>
            <button id="clearLeaderboardBtn" class="text-btn" type="button">Clear</button>
          </div>
          <ol id="resultLeaderboard" class="leaderboard-list"></ol>
        </div>

        <button id="playAgainBtn" class="primary-btn">Play Again</button>

        <div id="resultAdSlot" class="ad-slot large-ad-slot result-ad-slot" role="complementary" aria-label="Sponsored ad space"></div>
      </section>
    </main>

    <section id="betweenRoundInterstitial" class="interstitial hidden" aria-live="polite" role="dialog" aria-label="Sponsored transition space">
      <div class="interstitial-card">
        <p id="interstitialEyebrow" class="eyebrow"></p>
        <h2>Round Complete</h2>
        <p id="roundScoreLine" class="final-score"></p>
        <p id="roundSummaryLine" class="announcement-body"></p>
        <div id="interstitialAdSlot" class="ad-slot interstitial-slot" role="complementary" aria-label="Sponsored ad space"></div>
        <button id="continueRoundBtn" class="primary-btn">Continue</button>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
