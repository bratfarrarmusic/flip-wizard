<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Wizard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>Flip Wizard</h1>

      <section id="intro" class="panel intro-panel">
        <p class="eyebrow">Version 2</p>
        <h2>Fast Record Flips</h2>
        <p>Trust your instinct. Swipe-era pacing. One card, one call.</p>
        <button id="startBtn" class="primary-btn">Start Game</button>
      </section>

      <section id="game" class="panel hidden" aria-live="polite">
        <div class="status-row">
          <p id="cardCount" class="pill"></p>
          <p id="score" class="pill"></p>
          <p id="timer" class="pill timer-pill"></p>
        </div>

        <article class="record-card">
          <div id="albumTile" class="album-tile" role="img" aria-label="Album cover">
            <span id="tileArtist" class="tile-artist"></span>
            <span id="tileTitle" class="tile-title"></span>
          </div>

          <div class="record-meta">
            <p class="meta-item"><span>Artist</span><strong id="artist"></strong></p>
            <p class="meta-item"><span>Title</span><strong id="title"></strong></p>
            <p class="meta-item"><span>Buy Price</span><strong id="buyPrice"></strong></p>
          </div>

          <div class="action-row">
            <button id="yesBtn" class="answer-btn yes">Yes</button>
            <button id="noBtn" class="answer-btn no">No</button>
          </div>
        </article>
      </section>

      <section id="result" class="panel hidden" aria-live="polite">
        <h2>Round Complete</h2>
        <p id="finalScore" class="final-score"></p>
        <p id="summary" class="summary"></p>
        <p id="rating" class="rating"></p>
        <button id="playAgainBtn" class="primary-btn">Play Again</button>
      </section>
    </main>

    <div id="interstitial" class="interstitial hidden" aria-live="polite" role="status">
      <p>Loading next record...</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
