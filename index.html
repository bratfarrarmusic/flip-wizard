<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Wizard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Flip Wizard</h1>
    <p>Welcome to Flip Wizard. Can you make a flip on all these items?</p>

    <div id="game">
      <h2>Round One</h2>
      <p>
        Look at the record and the information shown, then choose Yes or No to
        decide whether it is a profitable flip.
      </p>
      <button id="startBtn">Start Game</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
